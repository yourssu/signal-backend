server:
  port: 8080

spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true
      path: /h2-console

domain:
  permission:
    admin:
      access-key: "test-admin-access-key"
      contact-secret-key: "test-contact-secret-key"
  policy:
    whitelist: false
    contact-limit: 4
    contact-limit-warning: 2
    contact-price: 1
    ticket-price-policy: single@1000n1.small@3000n4.best@5000n8
    ticket-price-registered-policy: single@700n1.small@2100n4.best@3500n8

infra:
  openai:
    url: "https://api.openai.com/v1/responses"
    api-key: "test-openai-api-key"
    model: "gpt-4o-mini"
    prompt: "test prompt"
    user-input: 100
  kakaopay:
    admin-key: "test-kakaopay-admin-key"
    cid: "TC0ONETIME"
    "approval_url": "https://yourssu.signal.com/payment/success"
    "cancel_url": "https://yourssu.signal.com/payment/cancel"
    "fail_url": "https://yourssu.signal.com/payment/fail"
  google:
    oauth:
      client-id: ${GOOGLE_OAUTH_CLIENT_ID:test-google-client-id}
      client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:test-google-client-secret}
      redirect-uri: ${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8080/auth/callback}

jwt:
  secret: "test-jwt-secret-minimum-256-bits-long-string-for-testing-only-do-not-use-in-prod"
  access-token-expiration: 1800000
  refresh-token-expiration: 2592000000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
